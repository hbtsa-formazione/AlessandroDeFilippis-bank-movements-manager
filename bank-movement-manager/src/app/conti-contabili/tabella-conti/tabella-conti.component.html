<div class="card table-container">
  <table class="table">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Codice</th>
        <th>Descrizione</th>
        <th>Tipo</th>
        <th class="actions-col">Azioni</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of contiContabili">
        <td><strong>{{ c.nome }}</strong></td>
        <td class="code-cell">{{ c.code }}</td>
        <td>{{ c.description }}</td>
        <td>{{ c.type }}</td>
        <td>
          <div class="actions">
            <button type="button" class="btn btn-sm btn-secondary" (click)="edit.emit(c)">✏️</button>
            <button type="button" class="btn btn-sm btn-danger" (click)="remove.emit(c)">🗑️</button>
          </div>
        </td>
      </tr>
      <tr *ngIf="contiContabili.length === 0">
        <td colspan="5" class="empty-cell">
          <p class="text-muted">Nessun conto contabile presente.</p>
        </td>
      </tr>
    </tbody>
  </table>
</div>
