<div class="container">
  <div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ isEdit ? 'Modifica Conto' : 'Nuovo Conto' }}</h2>
    <p style="color: #666; margin-bottom: 20px;">
      Compila i dettagli del conto bancario qui sotto.
    </p>

    <form [formGroup]="form" (ngSubmit)="salva()">
      <!-- Nome Conto -->
      <div class="form-group">
        <label for="accountName">Nome Conto *</label>
        <input 
          id="accountName"
          type="text"
          class="form-control"
          formControlName="name" 
          placeholder="Es. Conto Principale"
          [class.invalid]="form.get('name')?.invalid && form.get('name')?.touched">
        
        <!-- Messaggi di errore -->
        <div class="alert alert-danger" *ngIf="form.get('name')?.invalid && form.get('name')?.touched" style="margin-top: 5px; padding: 5px 10px; font-size: 0.8rem;">
          <span *ngIf="form.get('name')?.errors?.['required']">Il nome è obbligatorio.</span>
          <span *ngIf="form.get('name')?.errors?.['maxlength']">Massimo 80 caratteri.</span>
        </div>
      </div>

      <!-- IBAN -->
      <div class="form-group">
        <label for="accountIban">IBAN *</label>
        <input 
          id="accountIban"
          type="text"
          class="form-control"
          formControlName="iban" 
          placeholder="IT00X..."
          style="font-family: monospace;"
          [class.invalid]="form.get('iban')?.invalid && form.get('iban')?.touched">
        
        <div class="alert alert-danger" *ngIf="form.get('iban')?.invalid && form.get('iban')?.touched" style="margin-top: 5px; padding: 5px 10px; font-size: 0.8rem;">
          <span *ngIf="form.get('iban')?.errors?.['required']">L'IBAN è obbligatorio.</span>
          <span *ngIf="form.get('iban')?.errors?.['maxlength']">Lunghezza non valida.</span>
        </div>
      </div>

      <!-- Valuta -->
      <div class="form-group">
        <label for="accountCurrency">Valuta *</label>
        <select 
          id="accountCurrency"
          class="form-control"
          formControlName="currency">
          <option value="EUR">EUR - Euro</option>
          <option value="USD">USD - Dollaro Americano</option>
          <option value="GBP">GBP - Sterlina Britannica</option>
        </select>
      </div>

      <!-- Azioni -->
      <div class="flex-row flex-between" style="margin-top: 30px;">
        <button class="btn btn-secondary" type="button" (click)="this['annulla']()">Annulla</button>
        <button class="btn btn-primary" type="submit" [disabled]="form.invalid">
          {{ isEdit ? 'Salva Modifiche' : 'Crea Conto' }}
        </button>
      </div>
    </form>
  </div>
</div>
