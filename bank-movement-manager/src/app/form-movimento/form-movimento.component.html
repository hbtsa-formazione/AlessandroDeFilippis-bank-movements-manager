<div class="container">
  <div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ isEditMode ? 'Modifica Movimento' : 'Registra Movimento' }}</h2>
    <p class="text-muted mb-3">Inserisci i dettagli della transazione.</p>

    <form [formGroup]="form" (ngSubmit)="onSave()">
      
      <!-- Selezione Conto -->
      <div class="form-group">
        <label for="accountId">Conto Bancario *</label>
        <select 
          id="accountId" 
          class="form-control" 
          formControlName="accountId"
          [class.invalid]="form.get('accountId')?.invalid && form.get('accountId')?.touched">
          <option value="">-- Seleziona un conto --</option>
          <option *ngFor="let account of accounts$ | async" [value]="account.id">
            {{ account.name }} ({{ account.currency }})
          </option>
        </select>
        <div class="alert alert-danger" *ngIf="form.get('accountId')?.invalid && form.get('accountId')?.touched" style="margin-top: 5px; padding: 5px;">
          Seleziona un conto valido.
        </div>
      </div>

      <!-- Data -->
      <div class="form-group">
        <label for="date">Data Movimento *</label>
        <input 
          type="date" 
          id="date" 
          class="form-control" 
          formControlName="date"
          [class.invalid]="form.get('date')?.invalid && form.get('date')?.touched">
      </div>

      <!-- Descrizione -->
      <div class="form-group">
        <label for="description">Descrizione *</label>
        <input 
          type="text" 
          id="description" 
          class="form-control" 
          formControlName="description"
          placeholder="Es. Spesa supermercato"
          [class.invalid]="form.get('description')?.invalid && form.get('description')?.touched">
      </div>

      <!-- Grid per Valuta e Importo -->
      <div class="grid-2">
        <div class="form-group">
          <label for="currency">Valuta *</label>
          <select id="currency" class="form-control" formControlName="currency">
            <option *ngFor="let curr of currencies" [value]="curr">{{ curr }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Importo *</label>
          <input 
            type="number" 
            step="0.01" 
            id="amount" 
            class="form-control" 
            formControlName="amount"
            placeholder="0.00"
            [class.invalid]="form.get('amount')?.invalid && form.get('amount')?.touched">
          <small class="text-muted">Usa il segno meno (-) per le uscite.</small>
        </div>
      </div>

      <!-- Pulsanti -->
      <div class="flex-row flex-between" style="margin-top: 24px;">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Annulla</button>
        <button type="submit" class="btn btn-primary" [disabled]="!form.valid">
          {{ isEditMode ? 'Salva Modifiche' : 'Registra' }}
        </button>
      </div>

    </form>
  </div>
</div>
